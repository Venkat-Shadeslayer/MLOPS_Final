name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas numpy scikit-learn pyyaml \
                      sqlalchemy pydantic fastapi requests xgboost \
                      "mlflow<3" pyarrow

      - name: Lint (ruff)
        run: ruff check src tests || true

      - name: Unit tests
        run: pytest tests/unit -v --tb=short

      - name: DVC pipeline dry-run
        run: |
          pip install dvc
          dvc dag || true

  smoke-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/api/Dockerfile -t aqi-api:ci .
      - name: Build frontend image
        run: docker build -f docker/frontend/Dockerfile -t aqi-frontend:ci .
