# ============================================================================
# DVC pipeline DAG
# ingest -> validate -> feature_engineer -> train
# ============================================================================

stages:

  ingest:
    cmd: python -m src.data.ingest
    deps:
      - src/data/ingest.py
      - src/utils/config.py
    params:
      - ingest
    outs:
      - data/raw/city_day.csv:
          cache: true
          persist: true

  validate:
    cmd: python -m src.data.validate
    deps:
      - src/data/validate.py
      - src/utils/config.py
      - data/raw/city_day.csv
    params:
      - validate
    outs:
      - data/processed/validation_report.json:
          cache: true

  feature_engineer:
    cmd: python -m src.features.transform
    deps:
      - src/features/transform.py
      - src/features/baseline_stats.py
      - src/utils/config.py
      - data/raw/city_day.csv
      - data/processed/validation_report.json
    params:
      - features
      - baseline
    outs:
      - data/processed/features.parquet:
          cache: true
      - data/processed/baseline_stats.json:
          cache: true
      - data/processed/city_encoding.yaml:
          cache: true

  train_xgboost:
    cmd: python -m src.models.xgboost_trainer
    deps:
      - src/models/xgboost_trainer.py
      - src/models/dataset.py
      - src/utils/config.py
      - data/processed/features.parquet
    params:
      - train

  train_nn:
    cmd: python -m src.models.nn_trainer
    deps:
      - src/models/nn_trainer.py
      - src/models/dataset.py
      - src/utils/config.py
      - data/processed/features.parquet
    params:
      - train

  register_best:
    cmd: python -m src.models.register
    deps:
      - src/models/register.py
      - src/utils/config.py
    params:
      - train