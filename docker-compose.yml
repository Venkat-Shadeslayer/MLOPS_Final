# ============================================================================
# AQI MLOps stack — Docker Compose
# ----------------------------------------------------------------------------
# Services (8 total, single private bridge network):
#   - postgres      metadata for Airflow + MLflow + predictions log
#   - mlflow        tracking server + model registry (UI :5000)
#   - airflow-init  one-shot DB migrate + admin user create, exits 0
#   - airflow       webserver + scheduler (LocalExecutor, UI :8080)
#   - api           FastAPI inference (:8000), /metrics for Prometheus
#   - frontend      Streamlit multipage UI (:8501)
#   - prometheus    metrics scraper (:9090)
#   - grafana       dashboards + alerts (:3000)
#
# Loose-coupling note (rubric — Design Principle 2pt):
#   Frontend -> API only via HTTP REST.
#   API     -> MLflow via client library.
#   No DB sharing across service boundaries.
# ============================================================================

services:

  postgres:
    image: postgres:15-alpine
    container_name: mlops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_databases.sh:/docker-entrypoint-initdb.d/init_databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ mlops_net ]

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlops_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5001:5000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks: [ mlops_net ]

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: mlops_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin --lastname User --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    networks: [ mlops_net ]

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: mlops_airflow
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./params.yaml:/opt/airflow/params.yaml:ro
      - ~/.kaggle:/home/airflow/.kaggle:ro
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s
    command: bash -c "airflow scheduler & airflow webserver"
    networks: [ mlops_net ]

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: mlops_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    volumes:
      - ./src:/app/src
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks: [ mlops_net ]

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: mlops_frontend
    restart: unless-stopped
    # depends_on:
    #   api:
    #     condition: service_started
    env_file: .env
    environment:
      STREAMLIT_API_URL: http://api:8000
      PYTHONPATH: /app
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "8501:8501"
    networks: [ mlops_net ]

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: mlops_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks: [ mlops_net ]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: mlops_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # Cookie policy: iframe on http://localhost:8501 embeds http://localhost:3001.
      # Different ports = cross-site cookies. Must be SameSite=None + no Secure in dev.
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001/"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks: [ mlops_net ]

  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: mlops_pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks: [ mlops_net ]

volumes:
  postgres_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:


networks:
  mlops_net:
    driver: bridge
